name: Sync Manual Skills

on:
  # Run when manual_skills.json is updated on main (e.g. after a PR is merged)
  push:
    branches:
      - main
    paths:
      - 'data/manual_skills.json'
  # Support manual trigger
  workflow_dispatch:

concurrency:
  group: sync-manual-skills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun (official script)
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Register new manual skills with skills.sh
        run: python scripts/register_new_manual_skills.py

      - name: Fetch SKILL.md for manual skills and rebuild index
        run: bun run crawl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip syncing SKILL.md for all skills.sh skills (too slow for a targeted manual-skills run).
          # The crawler always fetches SKILL.md for every entry in manual_skills.json.
          SYNC_ALL_SKILL_MDS: "0"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build category index
        run: python scripts/build_skill_category_index.py

      - name: Build skill search index
        run: python scripts/build_skill_search_index.py

      - name: Commit data updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "chore: sync manual skills data $(date +'%Y-%m-%d %H:%M:%S')"

          git fetch origin main
          git rebase origin/main -X theirs

          for i in 1 2 3 4 5; do
            git push && break
            echo "Push failed, retrying ($i/5)..."
            git fetch origin main
            git rebase origin/main -X theirs
            sleep $((i * 2))
          done

      - name: Install translation dependencies
        run: pip install deep-translator requests

      - name: Translate new descriptions
        env:
          NEVERSIGHT_API_KEY: ${{ secrets.NEVERSIGHT_API_KEY }}
        run: |
          # Limit to 50 per language — manual skill batches are small
          python scripts/translate_descriptions.py --target zh-CN --limit 50
          python scripts/translate_descriptions.py --target zh-TW --limit 50
          python scripts/translate_descriptions.py --target es --limit 50
          python scripts/translate_descriptions.py --target ja --limit 50
          python scripts/translate_descriptions.py --target ko --limit 50
          python scripts/translate_descriptions.py --target de --limit 50
          python scripts/translate_descriptions.py --target fr --limit 50
          python scripts/translate_descriptions.py --target ru --limit 50
          python scripts/translate_descriptions.py --target it --limit 50
          python scripts/translate_descriptions.py --target ar --limit 50

      - name: Commit translations
        run: |
          git add data/skills-md/
          if git diff --staged --quiet; then
            echo "No new translations to commit"
          else
            git commit -m "chore: translate manual skill descriptions"

            git fetch origin main
            git rebase origin/main -X theirs

            for i in 1 2 3 4 5; do
              git push && break
              echo "Push failed, retrying ($i/5)..."
              git fetch origin main
              git rebase origin/main -X theirs
              sleep $((i * 2))
            done
          fi
